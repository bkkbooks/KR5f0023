front:
  text: 隂丹内篇坎天也陽始生也離坤也隂始生也陽豈無隂坎之外皆隂也隂豈無陽離之外皆陽也採隂之陽實陽之隂守陽之陽變陽之隂是故上而從天下而沙泥中而平人皆易其形而乾位成矣紫廷紅鈆玉峯瓊漿丹壺炎光不失其方而三峰得矣必觀其妙二八爲斤三八爲兩而斤兩平矣必靜其輻四十爲文六十爲武而文武備矣一尺龍泉兩角倉虯顯神物也琥珀拾芥磁石引針表神應也以鈆聚汞以汞聚神以神守形以氣引藥以藥引年以年鍊形吾道盡矣得者勿言言者勿傳言而傳之殃及九祖受考三官
  hash: sha256:e7b38f809651bd34173d5a8594f93081c4be005b43c39862e8c1dcbcb85569f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0023_HFL_000-001a, image: hfl/0874/0874-020.png}
body:
  text: 臣解曰天陽也始生於坎坤隂也始生於離陽亦有隂故坎内陽外隂隂亦有陽故離外陽内隂隂丹之訣唯採陽鍊陽銷去羣隂而以爲純陽之人此其法之大率也從天三爻也平人二爻也沙泥初爻也易其形則變隂爲陽紅鈆初鼎也瓊漿入藥也炎光火候也得其方則去彼取此觀妙之法以斤兩計之斤爲先兩次之斤則數少兩則數多多不如少之妙也靜輻之法以文武煅之文爲先武次之文則不暴武則雖暴而不繁躁靜各適其事之宜也龍泉蒼虯一竒二耦相繼以成體耦在上竒在下稱物宜也琥珀磁石異類一氣相資以入藥以陽召陽以隂召隂同聲氣也鈆入絳宫木氣不泄故曰以鉛聚汞汞集於身神乃不散故曰以汞聚神抱神以靜形乃長存故曰以神守形先聚其藥以氣點之藥隨氣至故曰以氣引藥藥入於鼎精神内守故曰以藥引年鍊形不已變成金骨故曰以年鍊形道至於此無復餘藴唯在愼其傳而已不愼其傳則九祖之殃三官之考非虚語也臣嘗觀吕仙翁鼎訣並傅士安所上隂丹訣互有異同雖云三峰其實有二蓋迷其所謂紫廷紅鈆而以丹壼流砂爲之是其所以減三而爲二者也今臣之所釋三者備矣而其大槩已盡於言以其當祕之也故錯亂其辭如參同契云隂丹内篇
  hash: sha256:953447c077a155d83a0918892f807e211f56d8c05722dfafedb01e3a2b2bf333
