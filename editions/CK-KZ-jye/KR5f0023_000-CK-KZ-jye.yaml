body:
  text: 臣解曰天陽也始生於坎坤陰也始生於離陽亦有陰故坎內陽外陰陰亦有陽故離外陽內陰陰丹之訣唯採陽鍊陽銷去羣陰而以爲純陽之人此其法之大率也從天三爻也平人二爻也沙泥初爻也易其形則變陰爲陽紅鉛初鼎也瓊漿入藥也炎光火候也得其方則去彼取此觀妙之法以斤兩計之斤爲先兩次之斤則數少兩則數多多不如少之妙也靜輻之法以文武煅之文爲先武次之文則不暴武則雖暴而不繁躁靜各適其事之宜也龍泉蒼虯一奇二偶相繼以成體耦在上奇在下稱物宜也琥珀磁石異類一氣相資以入藥以陽召陽以陰召陰同聲氣也鈆入絳宫木氣不泄故曰以鉛聚汞汞集於身神乃不散故曰以汞聚神抱神以靜形乃長存故曰以神守形先聚其藥以氣點之藥隨氣至故曰以氣引藥藥入於鼎精神內守故曰以藥引年鍊形不已變成金骨故曰以年鍊形道至於此無復餘藴唯在愼其傳而已不愼其傳則九祖之殃三官之考非虛語也臣嘗觀吕仙翁鼎訣並傳士安所上陰丹訣互有異同雖云三峰其實有二蓋迷其所謂紫廷紅鉛而以丹壺流砂爲之是其所以減三而爲二者也今臣之所釋三者備矣而其大槪已盡於言以其當秘之也故錯亂其辭如參同契云
  hash: sha256:ef967fa1f6cd16793fd476c2a1e14f17935a6d8d222f0284b6eecd0dd15de07d
