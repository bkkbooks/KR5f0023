front:
  text: 坎天也陽始生也離地也陰始生也陽豈無陰坎之外皆陰也陰豈無陽離之外皆陽也採陰之陽寶陽之陰守陽之陽變陽之陰是故上而從天下而沙泥中而平人皆易其形而乾位成矣紫廷紅鈆玉峰瓊漿丹壺炎光不失其方而三峰得矣必觀其妙二八爲斤三八爲兩而斤兩平矣必靜其輻四十爲文六十爲武而文武備矣一尺龍泉兩角蒼虯顯神物也琥珀拾芥磁石引針表神應也以鉛聚汞以汞聚神以神守形以氣引藥以藥引年以年煉形吾道盡矣得者勿言言者勿傳言而傳之殃及九祖受考三官
  hash: sha256:63c5f449fc4ca9229c1bd684697b92c83e6522db9c964ac42b6aff96a4559f6b
